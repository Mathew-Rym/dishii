name: Dishii Autonomous Agent

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase pandas numpy python-dotenv requests openpyxl anthropic

      - name: Run Dishii Agent
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          EVOLUTION_URL:      ${{ secrets.EVOLUTION_URL }}
          EVOLUTION_KEY:      ${{ secrets.EVOLUTION_KEY }}
          EVOLUTION_INSTANCE: ${{ secrets.EVOLUTION_INSTANCE }}
          GCP_PROJECT_ID:     ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION:         ${{ secrets.GCP_REGION }}
        run: python agent.py
