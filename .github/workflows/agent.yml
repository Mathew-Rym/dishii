name: Dishii Autonomous Agent

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install supabase python-dotenv requests anthropic 2>/dev/null || true
          pip install -r requirements.txt

      - name: Run agent
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          EVOLUTION_URL:       ${{ secrets.EVOLUTION_URL }}
          EVOLUTION_KEY:       ${{ secrets.EVOLUTION_KEY }}
          EVOLUTION_INSTANCE:  ${{ secrets.EVOLUTION_INSTANCE }}
          GCP_PROJECT_ID:      ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION:          ${{ secrets.GCP_REGION }}
          CLAUDE_MODEL:        claude-sonnet-4-6
        run: python agent.py

      - name: Upload error log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-error-log
          path: /tmp/agent_error.log
          retention-days: 3
